<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - Ultra Realistic P2P</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PeerJS for P2P Networking & Voice Chat -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #030302; 
            font-family: 'VT323', monospace; 
            color: #fff; 
            user-select: none; 
        }
        #game-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
        }
        
        /* Found Footage & Analog CRT Effects */
        #vhs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background: 
                radial-gradient(circle, transparent 20%, rgba(0,0,0,0.72) 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 6px 100%;
            opacity: 0.9;
        }

        .ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            pointer-events: none; 
        }
        .interactive-layer { pointer-events: auto; }
        
        #hud-overlay { display: none; }
        .hud-text { position: absolute; font-size: 26px; color: #f5f5f5; text-shadow: 2px 2px #000; letter-spacing: 1px; }
        
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        /* Camera Autofocus Crosshair */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 80px; height: 80px;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 20;
            pointer-events: none;
            opacity: 0.6;
        }
        #crosshair svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
            animation: pulse-reticle 2s infinite ease-in-out;
        }

        @keyframes pulse-reticle {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .menu-panel {
            background: rgba(8, 8, 5, 0.95);
            border: 1px solid #3a3a2d;
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
        }
        
        #alert-box { display: none; z-index: 50; }
        #audio-container { display: none; }
    </style>
</head>
<body>

    <!-- 3D Canvas -->
    <div id="game-container"></div>
    
    <!-- VHS Found Footage Vignette Overlay -->
    <div id="vhs-overlay"></div>

    <!-- UI Overlays -->
    <div id="hud-overlay" class="ui-layer">
        <div class="hud-text" style="bottom: 30px; left: 40px;" id="level-display">LEVEL 0</div>
        <div class="hud-text" style="bottom: 65px; left: 40px; font-size: 18px; color: #a5a58d;" id="noise-meter">REC  [NOISE: |||]</div>
        <div class="hud-text" style="top: 30px; right: 40px; font-size: 20px; color: #ff3333;" id="cam-rec">● PLAY</div>
        
        <!-- Speakers List Overlay -->
        <div id="speaker-overlay" class="absolute top-10 left-10 flex flex-col gap-2 font-mono text-xs text-yellow-500/80"></div>
        
        <!-- Keyboard Logger Overlay -->
        <div id="key-logger-overlay" class="absolute bottom-6 right-10 bg-black/85 border border-zinc-800 p-3 rounded text-sm text-zinc-400 font-mono flex gap-2">
            <span class="text-zinc-600">INPUT:</span>
            <span id="log-keys" class="text-yellow-500 uppercase tracking-widest">- - -</span>
        </div>
    </div>
    
    <!-- Photo Flash -->
    <div id="flash-overlay"></div>

    <!-- Autofocus Cam Reticle -->
    <div id="crosshair">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cam Reticle Corners -->
            <path d="M 15 30 L 15 15 L 30 15" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 70 15 L 85 15 L 85 30" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 15 70 L 15 85 L 30 85" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 70 85 L 85 85 L 85 70" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Center Focus Dot -->
            <circle cx="50" cy="50" r="3" fill="#ffffff" opacity="0.8"/>
        </svg>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="ui-layer interactive-layer flex items-center justify-center backdrop-blur-md">
        <div class="menu-panel p-10 rounded-lg w-full max-w-lg text-center border-yellow-800/30">
            <h1 class="text-5xl text-yellow-600 mb-2 tracking-widest font-bold" style="text-shadow: 4px 4px 0 #3b320e;">THE BACKROOMS</h1>
            <p class="mb-8 text-gray-500 tracking-wider text-sm uppercase">P2P Co-Op & Voice-Detection Engine</p>
            
            <div class="space-y-4">
                <button onclick="startGame(false)" class="w-full bg-yellow-950/20 hover:bg-yellow-900/40 border border-yellow-700/40 p-4 text-xl tracking-wider transition-all duration-300">Singleplayer</button>
                
                <div class="border-t border-yellow-900/30 my-6"></div>
                
                <p class="text-xs text-yellow-500/80 text-left uppercase tracking-wider mb-1">Host Multiplayer Session (Give ID to friend):</p>
                <div class="flex space-x-2">
                    <input type="text" id="host-id-input" placeholder="Custom Room Code..." class="w-full p-3 bg-neutral-950 border border-neutral-800 text-white focus:outline-none focus:border-yellow-700 transition-colors text-lg">
                    <button onclick="hostGame()" class="bg-yellow-700 hover:bg-yellow-600 border border-yellow-500 px-6 transition-all font-bold tracking-wider">HOST</button>
                </div>
                
                <p class="text-xs text-yellow-500/80 text-left uppercase tracking-wider mb-1 mt-4">Join Friend's Session:</p>
                <div class="flex space-x-2">
                    <input type="text" id="join-id-input" placeholder="Room Code..." class="w-full p-3 bg-neutral-950 border border-neutral-800 text-white focus:outline-none focus:border-yellow-700 transition-colors text-lg">
                    <button onclick="joinGame()" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 px-6 transition-all font-bold tracking-wider">JOIN</button>
                </div>

                <div class="border-t border-yellow-900/30 my-6"></div>
                <button onclick="showSettings()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 p-3 transition-all tracking-wide text-sm uppercase">Graphics & Mic Setup</button>
            </div>
            
            <div id="connection-status" class="mt-4 text-sm text-yellow-600 h-6"></div>
        </div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-menu" class="ui-layer interactive-layer hidden flex items-center justify-center bg-black/85">
        <div class="menu-panel p-8 rounded-lg w-full max-w-sm text-center border-yellow-800/20">
            <h2 class="text-4xl text-yellow-500 mb-6 tracking-widest font-bold">PAUSED</h2>
            <div class="space-y-4">
                <button onclick="resumeGame()" class="w-full bg-yellow-950/20 hover:bg-yellow-900/30 border border-yellow-700/30 p-3 text-xl tracking-wide">Resume</button>
                <button onclick="location.reload()" class="w-full bg-red-950/20 hover:bg-red-900/30 border border-red-900/40 p-3 text-xl tracking-wide text-red-200">Abandon Run</button>
            </div>
            <div id="lobby-info" class="mt-6 text-xs text-gray-500 uppercase tracking-widest leading-5"></div>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settings-menu" class="ui-layer interactive-layer hidden flex items-center justify-center bg-black/95">
        <div class="menu-panel p-8 rounded-lg w-full max-w-sm text-center">
            <h2 class="text-4xl text-yellow-500 mb-6 font-bold tracking-wider">SETTINGS</h2>
            <div class="space-y-4 text-left">
                <label class="block text-gray-400 text-xs uppercase tracking-widest">Graphics Quality</label>
                <select id="gfx-quality" class="w-full p-3 bg-neutral-950 border border-neutral-800 text-white focus:outline-none" onchange="applySettings()">
                    <option value="low">Low (Fast & Pixelated)</option>
                    <option value="medium" selected>Medium Quality</option>
                    <option value="high">High (Soft Shadows & Lights)</option>
                </select>
                
                <label class="block text-gray-400 text-xs uppercase tracking-widest mt-4">Mic Voice Threshold</label>
                <input type="range" id="mic-sens" min="1" max="100" value="45" class="w-full accent-yellow-600">
            </div>
            <button onclick="hideSettings()" class="mt-8 w-full bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 p-3 text-xl uppercase tracking-wider">Apply</button>
        </div>
    </div>

    <!-- Custom Alert Box -->
    <div id="alert-box" class="fixed top-8 left-1/2 transform -translate-x-1/2 bg-yellow-950/90 border border-yellow-600/50 px-6 py-3 rounded text-yellow-100 shadow-xl tracking-wider text-lg">
        <span id="alert-msg">Message</span>
        <button onclick="document.getElementById('alert-box').style.display='none'" class="ml-4 font-bold text-yellow-500 hover:text-white">✕</button>
    </div>

    <!-- Hidden Audio Container for Voice Chat -->
    <div id="audio-container"></div>

    <script>
        let scene, camera, renderer;
        let isGameRunning = false;
        let isPaused = false;
        
        // Highly realistic Camera & player configuration
        const player = {
            velocity: new THREE.Vector3(),
            direction: new THREE.Vector3(),
            speed: 135.0, // Slowed down for realistic horror pacing
            sprintMultiplier: 1.55,
            height: 1.25, // Lower height for immersive realistic perspective
            mass: 100.0,
            pitch: 0,
            yaw: 0,
            targetPitch: 0, // Target values for camera interpolation (cinematic sway)
            targetYaw: 0,
            noiseLevel: 0
        };
        const cameraHolder = new THREE.Object3D(); 
        let flashlight;
        let flashlightActive = false;

        // Input state
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        let prevTime = performance.now();

        // Level & Trigger Engine
        let currentLevel = "Level 0";
        let walls = [];
        let wallMeshes = []; // Stored specifically for raycast acoustic obstruction
        let triggers = []; 
        let monsters = [];

        // Procedural Textures & Materials
        let materials = {};

        // Multiplayer P2P
        let peer = null;
        let connections = []; 
        let isHost = false;
        let myPeerId = "";
        let otherPlayers = {}; 
        
        // Voice Activated Monster Detection
        let localStream = null;
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let dataArray = null;
        let micSensitivity = 45;

        // Visual Quality
        let gfxSettings = { shadows: false, resolution: 1 };

        // Keyboard feedback active state tracking
        let activeKeysSet = new Set();
        let stepSoundTimer = 0;

        let synthCtx = null;
        let humOscillator = null;

        function initSoundEngine() {
            if(!synthCtx) {
                synthCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if(synthCtx.state === 'suspended') synthCtx.resume();
            
            // Continuous fluorescent hum (Iconic Backrooms buzz)
            if(!humOscillator) {
                humOscillator = synthCtx.createOscillator();
                humOscillator.type = 'sawtooth';
                humOscillator.frequency.value = 52.5; 
                
                const filter = synthCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 180;
                
                const gain = synthCtx.createGain();
                gain.gain.value = 0.055;
                
                humOscillator.connect(filter);
                filter.connect(gain);
                gain.connect(synthCtx.destination);
                humOscillator.start();
            }
        }

        // Mechanical keyclick generator
        function playKeyClickSound() {
            if(!synthCtx) return;
            const now = synthCtx.currentTime;
            
            const osc = synthCtx.createOscillator();
            const gain = synthCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.03);
            
            gain.gain.setValueAtTime(0.06, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
            
            osc.connect(gain);
            gain.connect(synthCtx.destination);
            osc.start();
            osc.stop(now + 0.04);
        }

        // Dynamic synthesised monster screech
        function playMonsterScreech() {
            if(!synthCtx) return;
            const now = synthCtx.currentTime;
            
            const osc1 = synthCtx.createOscillator();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(120, now);
            osc1.frequency.exponentialRampToValueAtTime(1800, now + 0.15);
            osc1.frequency.linearRampToValueAtTime(1000, now + 0.9);

            const osc2 = synthCtx.createOscillator();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(160, now);
            osc2.frequency.exponentialRampToValueAtTime(2200, now + 0.2);
            osc2.frequency.linearRampToValueAtTime(700, now + 0.8);

            const mainGain = synthCtx.createGain();
            mainGain.gain.setValueAtTime(0.01, now);
            mainGain.gain.linearRampToValueAtTime(0.45, now + 0.1);
            mainGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);

            // Add distorted organic breathing noise
            const bufferSize = synthCtx.sampleRate * 1.0;
            const buffer = synthCtx.createBuffer(1, bufferSize, synthCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = synthCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = synthCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(1500, now);
            filter.frequency.exponentialRampToValueAtTime(400, now + 0.9);

            const noiseGain = synthCtx.createGain();
            noiseGain.gain.setValueAtTime(0.25, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.9);

            osc1.connect(mainGain);
            osc2.connect(mainGain);
            noise.connect(filter);
            filter.connect(noiseGain);
            
            noiseGain.connect(synthCtx.destination);
            mainGain.connect(synthCtx.destination);

            osc1.start(now);
            osc2.start(now);
            noise.start(now);

            osc1.stop(now + 1.1);
            osc2.stop(now + 1.1);
            noise.stop(now + 1.1);
        }

        // Low mechanical heavy organic thud (Footsteps)
        function playSynthesizedFootstep() {
            if(!synthCtx) return;
            const now = synthCtx.currentTime;
            
            const osc = synthCtx.createOscillator();
            const gain = synthCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(65, now);
            osc.frequency.linearRampToValueAtTime(25, now + 0.12);
            
            gain.gain.setValueAtTime(0.18, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            
            // Soft cloth friction noise
            const bufferSize = synthCtx.sampleRate * 0.15;
            const buffer = synthCtx.createBuffer(1, bufferSize, synthCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = synthCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = synthCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 180;
            const noiseGain = synthCtx.createGain();
            noiseGain.gain.setValueAtTime(0.06, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
            
            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(synthCtx.destination);

            osc.connect(gain);
            gain.connect(synthCtx.destination);
            
            osc.start(now);
            noise.start(now);
            osc.stop(now + 0.16);
            noise.stop(now + 0.16);
        }

        function playScarySting() {
            if(!synthCtx) return;
            const osc = synthCtx.createOscillator();
            osc.type = 'sawtooth';
            const gain = synthCtx.createGain();
            
            osc.frequency.setValueAtTime(45, synthCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(15, synthCtx.currentTime + 1.2);
            
            gain.gain.setValueAtTime(0.7, synthCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, synthCtx.currentTime + 1.2);
            
            osc.connect(gain);
            gain.connect(synthCtx.destination);
            osc.start();
            osc.stop(synthCtx.currentTime + 1.5);
        }

        function playClickSound() {
            if(!synthCtx) return;
            const osc = synthCtx.createOscillator();
            const gain = synthCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1200, synthCtx.currentTime);
            gain.gain.setValueAtTime(0.08, synthCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.005, synthCtx.currentTime + 0.04);
            osc.connect(gain);
            gain.connect(synthCtx.destination);
            osc.start();
            osc.stop(synthCtx.currentTime + 0.05);
        }

        function playCameraSound() {
            if(!synthCtx) return;
            
            // Electronic flash charging
            const osc = synthCtx.createOscillator();
            const gainOsc = synthCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1500, synthCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(5000, synthCtx.currentTime + 0.12);
            gainOsc.gain.setValueAtTime(0.0, synthCtx.currentTime);
            gainOsc.gain.linearRampToValueAtTime(0.15, synthCtx.currentTime + 0.06);
            gainOsc.gain.linearRampToValueAtTime(0.0, synthCtx.currentTime + 0.12);
            osc.connect(gainOsc);
            gainOsc.connect(synthCtx.destination);
            osc.start();
            osc.stop(synthCtx.currentTime + 0.12);

            // Shutter mechanics
            const bufferSize = synthCtx.sampleRate * 0.12;
            const buffer = synthCtx.createBuffer(1, bufferSize, synthCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noiseSource = synthCtx.createBufferSource();
            noiseSource.buffer = buffer;
            const noiseFilter = synthCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 1200;
            const gainNoise = synthCtx.createGain();
            gainNoise.gain.setValueAtTime(0.75, synthCtx.currentTime + 0.1);
            gainNoise.gain.exponentialRampToValueAtTime(0.01, synthCtx.currentTime + 0.22);
            
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(gainNoise);
            gainNoise.connect(synthCtx.destination);
            noiseSource.start(synthCtx.currentTime + 0.1);
        }

        // Action utilities
        function toggleFlashlight() {
            flashlightActive = !flashlightActive;
            flashlight.intensity = flashlightActive ? 2.5 : 0; // Slightly brighter spotlight
            playClickSound();
        }

        function takePhoto() {
            const flash = document.getElementById('flash-overlay');
            flash.style.transition = 'none';
            flash.style.opacity = '1';
            
            playCameraSound();

            setTimeout(() => {
                flash.style.transition = 'opacity 0.8s cubic-bezier(0.1, 0.8, 0.2, 1)';
                flash.style.opacity = '0';
            }, 60);
        }

        function createNoiseTexture(color1, color2, width, height, density = 4) {
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, width, height);
            for(let i=0; i<(width*height)/density; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? color2 : color1;
                ctx.fillRect(Math.random()*width, Math.random()*height, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createWallpaperTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            // Base retro yellow wallpaper
            ctx.fillStyle = '#bfa55a';
            ctx.fillRect(0, 0, 512, 512);
            // Stripes
            ctx.fillStyle = '#aa8f42';
            for(let i=0; i<512; i+=64) {
                ctx.fillRect(i, 0, 8, 512);
            }
            // Dirty stains & mold
            for(let i=0; i<25; i++) {
                const gradient = ctx.createRadialGradient(
                    Math.random()*512, Math.random()*512, 5, 
                    Math.random()*512, Math.random()*512, Math.random()*80
                );
                gradient.addColorStop(0, 'rgba(50, 45, 20, 0.35)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0,0,512,512);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createConcreteTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#444444';
            ctx.fillRect(0, 0, 512, 512);
            // Noise & grit
            for(let i=0; i<8000; i++) {
                const shade = Math.floor(60 + Math.random()*30);
                ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
                ctx.fillRect(Math.random()*512, Math.random()*512, 1.5, 1.5);
            }
            // Leak lines
            ctx.strokeStyle = 'rgba(20, 18, 15, 0.4)';
            for(let i=0; i<8; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*512, 0);
                ctx.lineTo(Math.random()*512, 512);
                ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createTileTexture(baseColor, lineColor, size = 256) {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, size, size);
            
            // Draw grid
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, size, size);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function initializeMaterials() {
            const carpetTex = createNoiseTexture('#6e5d1a', '#54460f', 512, 512, 3);
            carpetTex.repeat.set(12, 12);
            
            const wallTex = createWallpaperTexture();
            wallTex.repeat.set(2, 2);
            
            const ceilTex = createNoiseTexture('#cccccc', '#999999', 256, 256, 5);
            ceilTex.repeat.set(15, 15);

            const poolTileTex = createTileTexture('#e0ffff', '#9fc5c5', 128);

        // --- 3D Environment Initialization ---
        function initThreeJS() {
            const container = document.getElementById('game-container');
            
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 1000);
            scene.add(cameraHolder);
            cameraHolder.add(camera);
            camera.position.y = player.height;

            // Flashlight configuration (SpotLight representing camera flash/flashlight)
            flashlight = new THREE.SpotLight(0xfffdf2, 0); 
            flashlight.position.set(0, -0.1, 0);
            flashlight.target.position.set(0, 0, -1);
            flashlight.angle = Math.PI / 4.5;
            flashlight.penumbra = 0.65;
            flashlight.distance = 45;
            flashlight.decay = 1.8;
            cameraHolder.add(flashlight);
            cameraHolder.add(flashlight.target);

            renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            applySettings(); 
            container.appendChild(renderer.domElement);

            initializeMaterials();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('pointerlockchange', pointerLockChange, false);
            
            document.addEventListener('keydown', (e) => {
                if(!isGameRunning || isPaused) return;
                
                // Track key visually & play mechanical sound
                const lowerKey = e.key.toLowerCase();
                let keyStr = e.code.replace('Key', '');
                if (e.code === 'ShiftLeft') keyStr = 'SHIFT';
                
                if (!activeKeysSet.has(keyStr)) {
                    activeKeysSet.add(keyStr);
                    playKeyClickSound();
                    updateKeyLoggerUI();
                }

                switch(e.code) {
                    case 'KeyW': keys.w = true; break;
                    case 'KeyA': keys.a = true; break;
                    case 'KeyS': keys.s = true; break;
                    case 'KeyD': keys.d = true; break;
                    case 'ShiftLeft': keys.shift = true; break;
                    case 'KeyT': toggleFlashlight(); break;
                    case 'KeyC': takePhoto(); break;
                    case 'Escape': togglePause(); break;
                }
            });
            document.addEventListener('keyup', (e) => {
                let keyStr = e.code.replace('Key', '');
                if (e.code === 'ShiftLeft') keyStr = 'SHIFT';
                
                activeKeysSet.delete(keyStr);
                updateKeyLoggerUI();

                switch(e.code) {
                    case 'KeyW': keys.w = false; break;
                    case 'KeyA': keys.a = false; break;
                    case 'KeyS': keys.s = false; break;
                    case 'KeyD': keys.d = false; break;
                    case 'ShiftLeft': keys.shift = false; break;
                }
            });
        }

        function updateKeyLoggerUI() {
            const element = document.getElementById('log-keys');
            if (activeKeysSet.size === 0) {
                element.innerText = "- - -";
            } else {
                element.innerText = Array.from(activeKeysSet).join(" + ");
            }
        }

        function requestPointerLock() {
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        }

        function pointerLockChange() {
            const pauseMenu = document.getElementById('pause-menu');
            if (document.pointerLockElement === document.body) {
                isPaused = false;
                pauseMenu.classList.add('hidden');
                document.getElementById('crosshair').style.display = 'block';
                if(synthCtx && synthCtx.state === 'suspended') synthCtx.resume();
                if(audioContext && audioContext.state === 'suspended') audioContext.resume();
            } else {
                if(isGameRunning) {
                    isPaused = true;
                    pauseMenu.classList.remove('hidden');
                    pauseMenu.querySelector('h2').innerText = "PAUSED";
                    pauseMenu.querySelector('button').innerText = "RESUME";
                    document.getElementById('crosshair').style.display = 'none';
                }
            }
        }

        function onMouseMove(event) {
            if (isPaused || !isGameRunning || document.pointerLockElement !== document.body) return;
            const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
            const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

            // Shift target rotation values (for realistic camera lerping)
            player.targetYaw -= movementX * 0.0016;
            player.targetPitch -= movementY * 0.0016;
            player.targetPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.targetPitch));
        }

        function clearLevel() {
            for(let i = scene.children.length - 1; i >= 0; i--) { 
                let obj = scene.children[i];
                if(obj !== cameraHolder) {
                    scene.remove(obj);
                }
            }
            walls = [];
            wallMeshes = [];
            triggers = [];
            monsters = [];
        }

        function buildBox(x, y, z, w, h, d, material, isTrigger = false, action = null) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            if(gfxSettings.shadows && material) {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
            }
            scene.add(mesh);
            
            if(!isTrigger && y >= 0 && material !== null) {
                const box = new THREE.Box3().setFromObject(mesh);
                walls.push(box);
                wallMeshes.push(mesh); // Stored specifically for occlusion checks
            }
            
            if(isTrigger) {
                mesh.visible = false; 
                const box = new THREE.Box3().setFromObject(mesh);
                triggers.push({ box, action });
            }
            return mesh;
        }

        function spawnPlayer(x, z) {
            cameraHolder.position.set(x, player.height, z);
            player.velocity.set(0,0,0);
            player.targetYaw = 0;
            player.targetPitch = 0;
            player.yaw = 0;
            player.pitch = 0;
        }

                buildBox(tx, 2, tz, 3.5, 4, 3.5, null, true, destinationFn);

                const mat = new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(canvas)});
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.5), mat);

        function spawnMonster(x, y, z) {

            const bodySegments = [];
            for(let i=0; i<6; i++) {
                const segmentGeo = new THREE.SphereGeometry(0.24 - (i*0.02), 8, 8);
                const segmentMat = new THREE.MeshLambertMaterial({color: 0x09090a, roughness: 0.95});
                const segment = new THREE.Mesh(segmentGeo, segmentMat);
                segment.position.set(0, 0, -i*0.35);
                group.add(segment);
                bodySegments.push(segment);
            }

            // Blue/glowing organic toxic spike growth (as seen in visual reference)
            const spikeMat = new THREE.MeshBasicMaterial({color: 0x2277ff});
            bodySegments.forEach((segment, idx) => {
                for(let k=0; k<4; k++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.02, 0.35, 4), spikeMat);
                    spike.position.set((Math.random()-0.5)*0.3, 0.2, (Math.random()-0.5)*0.3);
                    spike.rotation.set(Math.random()*0.4, Math.random()*0.4, Math.random()*Math.PI);
                    segment.add(spike);
                }
            });
            
            // Dynamic insectoid multi-jointed creepy crawlers (legs)
            const legMat = new THREE.MeshLambertMaterial({color: 0x040404, roughness: 1.0});
            const legs = [];
            for(let i=0; i<8; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const segmentIndex = Math.floor(i / 2);
                
                const hipJoint = new THREE.Group();
                hipJoint.position.set(side * 0.2, 0, -segmentIndex * 0.4);
                
                // Upper limb
                const upperLimb = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.02, 1.2), legMat);
                upperLimb.position.y = -0.5;
                upperLimb.rotation.z = side * (Math.PI / 4);
                hipJoint.add(upperLimb);

                // Lower jointed claw
                const lowerLimb = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.005, 1.2), legMat);
                lowerLimb.position.set(side * 0.4, -1.0, 0);
                lowerLimb.rotation.z = -side * (Math.PI / 5);
                hipJoint.add(lowerLimb);

                group.add(hipJoint);
                legs.push(hipJoint);
            }
            
            // Screaming gaping jaw and horror light
            const horrorLight = new THREE.PointLight(0xff0e0e, 1.8, 12);
            horrorLight.position.set(0, -0.2, 0.6);
            group.add(horrorLight);

            // Glowing insect eyes
            for(let i=0; i<6; i++) {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), new THREE.MeshBasicMaterial({color: 0xff0000}));
                eye.position.set((i%2===0?0.14:-0.14), (i<3?0.08:-0.08), 0.25 + (Math.random()*0.05));
                group.add(eye);
            }

            group.position.set(x, y, z);
            scene.add(group);
            
            const monData = {
                mesh: group,
                legs: legs,
                baseSpeed: 3.2,
                active: true,
                scareTriggered: false,
                stepTimer: 0
            };
            monsters.push(monData);
            return monData;
        }

        function updateMonsters(delta) {
            if(!isHost && peer !== null) return; 
            
            let maxNoise = player.noiseLevel;
            for(let id in otherPlayers) {
                if(otherPlayers[id].noise > maxNoise) maxNoise = otherPlayers[id].noise;
            }

            monsters.forEach(mon => {
                if(!mon.active) return;
                
                let target = cameraHolder.position;
                let minDist = mon.mesh.position.distanceTo(target);

                for(let id in otherPlayers) {
                    let d = mon.mesh.position.distanceTo(otherPlayers[id].mesh.position);
                    if(d < minDist) {
                        minDist = d;
                        target = otherPlayers[id].mesh.position;
                    }
                }

                let currentSpeed = mon.baseSpeed;
                let light = mon.mesh.children.find(c => c.type === 'PointLight');
                
                if(currentLevel === "Level 0") {
                    // Voice activation mechanics (Aggressively speeds up based on decibel feedback)
                    if(maxNoise > 18) {
                        currentSpeed += (maxNoise / 7.5); 
                        if(light) light.intensity = 4.5;
                    } else {
                        if(light) light.intensity = 1.8;
                    }
                }

                const dir = new THREE.Vector3().subVectors(target, mon.mesh.position);
                dir.y = 0; 
                dir.normalize();
                
                // Realistically crawl along the ceiling, dropping down on top of player in close quarters
                let targetY = 2.75; 
                if(minDist < 5.5) {
                    targetY = 0.95; 
                    if(!mon.scareTriggered) {
                        playMonsterScreech(); // Play highly realistic scary screech!
                        playScarySting();
                        mon.scareTriggered = true;
                    }
                } else {
                    mon.scareTriggered = false;
                }
                mon.mesh.position.y += (targetY - mon.mesh.position.y) * delta * 4.2;

                // Move path calculation with collision avoidance
                const nextPos = mon.mesh.position.clone().add(dir.clone().multiplyScalar(currentSpeed * delta));
                const box = new THREE.Box3().setFromObject(mon.mesh);
                box.translate(dir.clone().multiplyScalar(currentSpeed * delta));
                
                let collision = false;
                for(let w of walls) {
                    if(box.intersectsBox(w)) {
                        collision = true;
                        break;
                    }
                }

                if(!collision) {
                    mon.mesh.position.copy(nextPos);
                } else {
                    // Slide along structure
                    mon.mesh.position.add(new THREE.Vector3(dir.x, 0, 0).multiplyScalar(currentSpeed * delta * 0.4));
                }
                
                mon.mesh.lookAt(target);

                // Organic leg twitch animations while crawling (Creepy atmosphere)
                mon.stepTimer += delta * currentSpeed * 4;
                mon.legs.forEach((leg, idx) => {
                    leg.rotation.z = Math.sin(mon.stepTimer + idx) * 0.35;
                });

                if(minDist < 1.3) {
                    showCustomAlert("CAUGHT BY THE CEILING CRAWLER.");
                    isGameRunning = false;
                    setTimeout(() => location.reload(), 2500);
                }
            });
        }

        async function setupMicrophone() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    showCustomAlert("Microphone interface missing. Voice features disabled.");
                    return false;
                }
                
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(localStream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // --- Echo Loop Simulation ---
                // Connect mic through a low pass feedback loop inside player headphones (extremely cool backrooms feel)
                const delayNode = audioContext.createDelay(1.0);
                delayNode.delayTime.value = 0.36; // 360ms delayed feedback loop

                const feedbackGain = audioContext.createGain();
                feedbackGain.gain.value = 0.35; // Feed back decay 

                const localEchoVolume = audioContext.createGain();
                localEchoVolume.gain.value = 0.08; // Safe level to minimize speaker feedback loops

                const filter = audioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 850; // Hollow muffled acoustics

                microphone.connect(delayNode);
                delayNode.connect(filter);
                filter.connect(feedbackGain);
                feedbackGain.connect(delayNode); // Feed back loop back to delay input
                feedbackGain.connect(localEchoVolume);
                
                localEchoVolume.connect(audioContext.destination);

                return true;
            } catch(e) {
                console.error(e);
                showCustomAlert("Mic access blocked. Running in silent mode.");
                return false;
            }
        }

        function updateAudio() {
            if(!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) {
                sum += dataArray[i];
            }
            let avg = sum / dataArray.length;
            player.noiseLevel = avg * (micSensitivity / 45);

            const meter = document.getElementById('noise-meter');
            let bars = Math.floor(player.noiseLevel / 8.5);
            if(bars > 12) bars = 12;
            meter.innerText = "REC  [NOISE: " + "|".repeat(bars) + " ".repeat(12 - bars) + "]";
            if(bars > 7) meter.style.color = '#ff3333';
            else meter.style.color = '#a5a58d';

            // Active Speaker Indicators
            const container = document.getElementById('speaker-overlay');
            container.innerHTML = "";
            if (player.noiseLevel > 14) {
                container.innerHTML += `<div>● LOCAL PLAYER [TALKING]</div>`;
            }
            for (let id in otherPlayers) {
                if (otherPlayers[id].noise > 14) {
                    container.innerHTML += `<div>● USER_${id.substring(0,5).toUpperCase()} [TALKING]</div>`;
                }
            }
        }

        function addRemoteAudio(stream, peerId) {
            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.id = `audio-${peerId}`;
            document.getElementById('audio-container').appendChild(audio);
        }

        function updatePositionalAudio() {
            const raycaster = new THREE.Raycaster();
            const localPos = cameraHolder.position.clone();

            for(let id in otherPlayers) {
                const aud = document.getElementById(`audio-${id}`);
                if(aud) {
                    let remotePos = otherPlayers[id].mesh.position.clone();
                    let dist = localPos.distanceTo(remotePos);
                    
                    // Raycast check: determine if player is blocked by any wall meshes
                    let isOccluded = false;
                    if(wallMeshes.length > 0) {
                        const dir = new THREE.Vector3().subVectors(remotePos, localPos);
                        const distanceToPlayer = dir.length();
                        dir.normalize();
                        
                        raycaster.set(localPos, dir);
                        const intersections = raycaster.intersectObjects(wallMeshes);
                        
                        for(let hit of intersections) {
                            if(hit.distance < distanceToPlayer) {
                                isOccluded = true;
                                break;
                            }
                        }
                    }

                    // Acoustic Wall Obstruction Multipliers
                    let maxDist = 35;
                    let baseVolume = 1 - (dist / maxDist);
                    if(baseVolume < 0) baseVolume = 0;
                    
                    if(isOccluded) {
                        baseVolume *= 0.18; // Muffle drastically behind thick walls!
                    }

                    aud.volume = Math.max(0, Math.min(1, baseVolume));
                }
            }
        }

        function initPeer(id = null, isHosting = false) {
            isHost = isHosting;
            peer = id ? new Peer(id) : new Peer();

            peer.on('open', (assignedId) => {
                myPeerId = assignedId;
                updateLobbyInfo();
                if(isHosting) {
                    showCustomAlert(`Session hosted successfully. Code: ${assignedId}`);
                }
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    addRemoteAudio(remoteStream, call.peer);
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                showCustomAlert("Networking connection failed.");
            });
        }

        function setupConnection(conn) {
            connections.push(conn);
            
            const mat = new THREE.MeshLambertMaterial({color: 0x4f4f3f});
            const geo = new THREE.CylinderGeometry(0.35, 0.35, 1.45, 8);
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            
            otherPlayers[conn.peer] = {
                conn: conn,
                mesh: mesh,
                noise: 0
            };

            conn.on('open', () => {
                if(isHost) {
                    conn.send({ type: 'level', data: currentLevel });
                }
            });

            conn.on('data', (data) => {
                handleNetworkData(conn.peer, data);
            });

            conn.on('close', () => {
                scene.remove(otherPlayers[conn.peer].mesh);
                delete otherPlayers[conn.peer];
                connections = connections.filter(c => c.peer !== conn.peer);
            });
        }

        function joinPeer(targetId) {
            const conn = peer.connect(targetId);
            setupConnection(conn);
            
            if(localStream) {
                const call = peer.call(targetId, localStream);
                call.on('stream', (remoteStream) => {
                    addRemoteAudio(remoteStream, targetId);
                });
            }
        }

        function handleNetworkData(senderId, data) {
            const remoteP = otherPlayers[senderId];
            if(!remoteP) return;

            if(data.type === 'pos') {
                remoteP.mesh.position.set(data.pos.x, data.pos.y, data.pos.z);
                remoteP.mesh.rotation.y = data.rot;
                remoteP.noise = data.noise;
            } else if(data.type === 'level') {
                if(!isHost && currentLevel !== data.data) {
                    switchLevel(data.data);
                }
            } else if(data.type === 'monsters' && !isHost) {
                for(let i=0; i<data.data.length; i++) {
                    if(monsters[i]) {
                        monsters[i].mesh.position.copy(data.data[i].pos);
                        monsters[i].mesh.rotation.y = data.data[i].rot;
                    }
                }
            }
        }

        function broadcastData(data) {
            for(let c of connections) {
                if(c.open) c.send(data);
            }
        }

        function switchLevel(levelName) {
            if(levelName === "Level 0") generateLevel0();
            else if(levelName === "Level 1") generateLevel1();
            else if(levelName === "The Poolrooms") generatePoolRooms();
            else if(levelName === "Level !") generateRunForYourLife();
            else if(levelName === "The Hub") generateHub();
            else if(levelName === "Level 37") generateLevel37();
            else if(levelName === "The End") generateTheEnd();
            
            if(isHost) {
                broadcastData({ type: 'level', data: currentLevel });
            }
        }

        function checkCollision(nextPos) {
            const size = 0.5;
            const height = 1.3;
            const playerBox = new THREE.Box3(
                new THREE.Vector3(nextPos.x - size/2, nextPos.y - height, nextPos.z - size/2),
                new THREE.Vector3(nextPos.x + size/2, nextPos.y + 0.15, nextPos.z + size/2)
            );

            for (let i = 0; i < walls.length; i++) {
                if (playerBox.intersectsBox(walls[i])) {
                    return true;
                }
            }
            return false;
        }

        function checkTriggers() {
            const size = 0.5;
            const pPos = cameraHolder.position;
            const playerBox = new THREE.Box3(
                new THREE.Vector3(pPos.x - size/2, pPos.y - 1.3, pPos.z - size/2),
                new THREE.Vector3(pPos.x + size/2, pPos.y + 0.15, pPos.z + size/2)
            );

            for(let t of triggers) {
                if(playerBox.intersectsBox(t.box)) {
                    if(t.action) {
                        t.action();
                        t.action = null; 
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isGameRunning || isPaused) return;

            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            updateAudio();
            updatePositionalAudio();

            // Realistically update camera angles using interpolation (cinematic found footage sway)
            player.yaw += (player.targetYaw - player.yaw) * 0.15;
            player.pitch += (player.targetPitch - player.pitch) * 0.15;
            
            cameraHolder.rotation.y = player.yaw;
            camera.rotation.x = player.pitch;

            player.velocity.x -= player.velocity.x * 9.0 * delta;
            player.velocity.z -= player.velocity.z * 9.0 * delta;

            player.direction.z = Number(keys.w) - Number(keys.s);
            player.direction.x = Number(keys.d) - Number(keys.a);
            player.direction.normalize();

            const speedMult = keys.shift ? player.sprintMultiplier : 1.0;

            if (keys.w || keys.s) player.velocity.z -= player.direction.z * player.speed * speedMult * delta;
            if (keys.a || keys.d) player.velocity.x -= player.direction.x * player.speed * speedMult * delta;

            const moveVec = new THREE.Vector3(player.velocity.x * delta, 0, player.velocity.z * delta);
            const euler = new THREE.Euler(0, cameraHolder.rotation.y, 0, 'YXZ');
            moveVec.applyEuler(euler);

            let nextPos = cameraHolder.position.clone();
            nextPos.x += moveVec.x;
            if (!checkCollision(nextPos)) {
                cameraHolder.position.x = nextPos.x;
            }

            nextPos = cameraHolder.position.clone();
            nextPos.z += moveVec.z;
            if (!checkCollision(nextPos)) {
                cameraHolder.position.z = nextPos.z;
            }

            // --- Camera Bobbing, Sway & Breathing logic ---
            const isMoving = player.direction.lengthSq() > 0;
            if(isMoving) {
                // Intense bobbing & shake during sprint
                const shakeAmplitudeY = keys.shift ? 0.08 : 0.038;
                const shakeAmplitudeX = keys.shift ? 0.045 : 0.015;
                const bobSpeed = keys.shift ? 0.013 : 0.008;

                camera.position.y = player.height + Math.sin(time * bobSpeed) * shakeAmplitudeY;
                camera.position.x = Math.cos(time * (bobSpeed * 0.5)) * shakeAmplitudeX;

                // Synthesized footsteps sound engine linked to bob peak
                stepSoundTimer += delta * (keys.shift ? 14 : 8);
                if (stepSoundTimer >= Math.PI * 2) {
                    playSynthesizedFootstep();
                    stepSoundTimer = 0;
                }
            } else {
                // Organic breathing sway when standing still (as requested)
                camera.position.y = player.height + Math.sin(time * 0.0018) * 0.009; 
                camera.position.x = Math.cos(time * 0.001) * 0.006;
                stepSoundTimer = 0;
            }

            checkTriggers();
            updateMonsters(delta);

            // Animate dynamic water shader/mesh in Poolrooms & Level 37
            const waterMesh = scene.getObjectByName("poolWater");
            if(waterMesh && waterMesh.material.color) {
                waterMesh.position.y = -0.1 + Math.sin(time * 0.0012) * 0.025;
            }

            // Animate flickering concrete area point lights
            scene.children.forEach(c => {
                if(c instanceof THREE.PointLight) {
                    if(c.userData.flicker && Math.random() > 0.96) {
                        c.intensity = Math.random() > 0.5 ? 0.05 : 0.6;
                    }
                    if(c.userData.flashPhase !== undefined) {
                        c.userData.flashPhase += delta * 6;
                        c.intensity = (Math.sin(c.userData.flashPhase) > 0) ? 2.0 : 0.1;
                    }
                }
            });

            if(connections.length > 0) {
                broadcastData({
                    type: 'pos',
                    pos: cameraHolder.position,
                    rot: cameraHolder.rotation.y,
                    noise: player.noiseLevel
                });

                if(isHost) {
                    let mData = monsters.map(m => ({ pos: m.mesh.position, rot: m.mesh.rotation.y }));
                    broadcastData({ type: 'monsters', data: mData });
                }
            }

            renderer.render(scene, camera);
        }

        // --- UI & Lifecycle Control ---
        async function startGame(isMultiplayer, isHosting = false, targetId = null) {
            document.getElementById('main-menu').classList.add('hidden');
            showCustomAlert("Calibrating Found Footage Feed & Audio Matrix...");

            await setupMicrophone();
            initSoundEngine();

            if(isMultiplayer) {
                if(isHosting) {
                    const cid = document.getElementById('host-id-input').value.trim();
                    initPeer(cid !== "" ? cid : null, true);
                } else {
                    const jid = document.getElementById('join-id-input').value.trim();
                    if(!jid) {
                        showCustomAlert("Room identity key is required.");
                        document.getElementById('main-menu').classList.remove('hidden');
                        return;
                    }
                    initPeer(null, false);
                    setTimeout(() => joinPeer(jid), 1000);
                }
            } else {
                updateLobbyInfo();
            }

            document.getElementById('alert-box').style.display = 'none';
            document.getElementById('hud-overlay').style.display = 'block';
            
            initThreeJS();
            generateLevel0();
            
            isGameRunning = true;
            isPaused = true; 
            prevTime = performance.now();
            
            const pauseMenu = document.getElementById('pause-menu');
            pauseMenu.classList.remove('hidden');
            pauseMenu.querySelector('h2').innerText = "CALIBRATION COMPLETE";
            pauseMenu.querySelector('button').innerText = "INITIALIZE CAM FEED";
            
            animate();
        }

        function hostGame() {
            startGame(true, true);
        }

        function joinGame() {
            startGame(true, false);
        }

        function togglePause() {
            if(!isGameRunning) return;
            if(isPaused) {
                resumeGame();
            } else {
                document.exitPointerLock(); 
            }
        }

        function resumeGame() {
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        }

        function showSettings() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.remove('hidden');
        }

        function hideSettings() {
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function applySettings() {
            const q = document.getElementById('gfx-quality').value;
            micSensitivity = document.getElementById('mic-sens').value;
            
            if(renderer) {
                if(q === 'low') {
                    renderer.setPixelRatio(0.4);
                    gfxSettings.shadows = false;
                } else if(q === 'medium') {
                    renderer.setPixelRatio(0.85);
                    gfxSettings.shadows = false;
                } else {
                    renderer.setPixelRatio(window.devicePixelRatio);
                    gfxSettings.shadows = true;
                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                }
            }
        }

        function updateLobbyInfo() {
            let str = `Status: ${isHost ? 'HOST' : 'CLIENT'}<br>`;
            if(myPeerId) str += `ROOM CODE: ${myPeerId}<br>`;
            str += `MEMBERS: ${connections.length + 1}/4`;
            
            const info = document.getElementById('lobby-info');
            if(info) info.innerHTML = str;
            
            const stat = document.getElementById('connection-status');
            if(stat) stat.innerText = myPeerId ? `Active Connection ID: ${myPeerId}` : "Server Link Offline";
        }

        function showCustomAlert(msg) {
            const box = document.getElementById('alert-box');
            document.getElementById('alert-msg').innerText = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 4500);
        }

        applySettings();
    </script>
